{% extends 'base.html' %}
{% load static %}
{% block title %}User Profile{% endblock title %}
{% block content %}

<div class="profile">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-4">
        <div class="text-center">
          {% if profile.user.profile_picture %}
          <img
            class="rounded rounded-circle profile-picture"
            src="{{ profile.user.profile_picture.url }}"
            alt="Profile Picture"
          />
          {% else %}
          <img
            class="rounded rounded-circle profile-picture"
            src="/media/user_profile/default.png"
            alt="Default Profile Picture"
          />
          {% endif %}
        </div>
        <ul class="text-center py-2">
            <li class="py-1">
                <span>Post: <strong>100</strong></span>
            </li>
            <li class="py-1">
                <span>Follower: <strong>100</strong></span>
            </li>
            <li class="py-1">
                <span>Following: <strong>100</strong></span>
            </li>
        </ul>
        <ul class="list-group text-center pt-3">
          <li class="list-group-item my-1">
            <a class="text-decoration-none" href="#">My Blog</a>
          </li>
          <li class="list-group-item my-1">
            <a class="text-decoration-none" href="#">Add Blog</a>
          </li>
        </ul>
      </div>
      <div class="col-md-8">
        <div class="my-3">
          <h3 class="text-muted">Profile Details</h3>
        </div>
        <hr>
        <div class="form">
          <div class="form-group">
            <label for="username">Username</label>
            <input class="form-control" name="username" type="text">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input class="form-control" name="username" type="text">
          </div>
          <div class="form-group">
            <label for="firstname">First Name</label>
            <input class="form-control" name="first_name" type="text">
          </div>
          <div class="form-group">
            <label for="lastname">Last Name</label>
            <input class="form-control" name="last_name" type="text">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" name="password" type="password">
          </div>
          <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input class="form-control" name="confirm_password" type="password">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock content %}
